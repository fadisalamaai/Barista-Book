<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>كتاب وصفات البريستا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0b08;
    --surface: #1a1410;
    --card: #1e1710;
    --border: #2e241a;
    --accent: #c8843a;
    --accent2: #e8a85a;
    --cream: #f5ead8;
    --muted: #7a6a55;
    --text: #ede0cc;
    --red: #c0392b;
    --green: #27ae60;
    --r: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    direction: rtl;
    overflow-x: hidden;
  }

  /* ══════════ HEADER ══════════ */
  .header {
    background: linear-gradient(180deg,#1a1410 0%,transparent 100%);
    padding: 52px 18px 18px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .logo {
    font-size: 24px;
    font-weight: 800;
    color: var(--cream);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .logo span { color: var(--accent); }
  .sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 16px; }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 18px rgba(200,132,58,.45);
    flex-shrink: 0;
    transition: transform .15s;
  }
  .btn-add:active { transform: scale(.92); }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 42px 12px 16px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    direction: rtl;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px; color: var(--muted);
  }

  /* CATEGORY TABS */
  .cats {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    flex-direction: row-reverse;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(200,132,58,.4);
  }

  /* ══════════ CONTENT ══════════ */
  .content { padding: 14px 14px 110px; }
  .section-label {
    font-size: 12px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .count-pill {
    background: var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
  }

  /* ══════════ RECIPE CARDS ══════════ */
  .recipe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .recipe-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    position: relative;
  }
  .recipe-card:active { transform: scale(.97); }
  .recipe-card.wide {
    grid-column: 1 / -1;
    display: flex;
    align-items: stretch;
    min-height: 140px;
  }

  /* Image area */
  .card-visual {
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .recipe-card:not(.wide) .card-visual {
    width: 100%;
    aspect-ratio: 1;
  }
  .recipe-card.wide .card-visual {
    width: 42%;
    aspect-ratio: unset;
  }
  .card-img {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
    z-index: 3;
    transition: transform 0.3s ease;
  }
  .recipe-card:hover .card-img {
    transform: scale(1.08);
  }
  .card-bg {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-emoji {
    font-size: 52px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.4));
    z-index: 2;
    position: relative;
  }
  .recipe-card.wide .card-emoji { font-size: 58px; }

  /* Orb / glow effect inside card */
  .card-orb {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    filter: blur(30px);
    opacity: .55;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Card info */
  .card-info {
    padding: 10px 12px 13px;
  }
  .recipe-card.wide .card-info {
    padding: 14px 14px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .cat-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 3px 9px;
    border-radius: 8px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.35;
    margin-bottom: 6px;
  }
  .recipe-card.wide .card-name { font-size: 17px; }
  .card-meta {
    display: flex;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 3px; }

  /* pill colours */
  .pill-hot       { background:rgba(231,76,60,.15);  color:#e74c3c; }
  .pill-cold      { background:rgba(52,152,219,.15); color:#3498db; }
  .pill-smoothie  { background:rgba(155,89,182,.15); color:#9b59b6; }
  .pill-milkshake { background:rgba(233,30,140,.15); color:#e91e8c; }
  .pill-juice     { background:rgba(243,156,18,.15); color:#f39c12; }
  .pill-dessert   { background:rgba(121,85,72,.15);  color:#a1887f; }

  /* ══════════ DETAIL VIEW ══════════ */
  .detail-view {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    max-width: 430px;
    margin: 0 auto;
    direction: rtl;
  }
  .detail-view.open { transform: translateX(0); }

  .detail-hero {
    position: relative;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .detail-hero-bg {
    position: absolute;
    inset: 0;
  }
  .detail-hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  .detail-hero-emoji {
    font-size: 90px;
    z-index: 2;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,.5));
    position: relative;
  }
  .detail-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 30%, var(--bg) 100%);
    z-index: 3;
  }
  .detail-back {
    position: absolute;
    top: 52px; left: 16px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--cream);
    border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .detail-edit-btn {
    position: absolute;
    top: 52px; right: 16px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--cream);
    border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }

  .detail-body {
    padding: 0 20px 100px;
    margin-top: -30px;
    position: relative;
    z-index: 5;
  }
  .detail-cat { margin-bottom: 10px; }
  .detail-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--cream);
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .detail-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 22px;
    font-weight: 400;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
  }
  .stat-val {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent2);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-lbl { font-size: 11px; color: var(--muted); }

  .sec-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-title::before { content:''; flex:1; height:1px; background:var(--border); }

  .ing-list { list-style:none; margin-bottom:26px; }
  .ing-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 7px;
    border: 1px solid var(--border);
    font-size: 14px;
  }
  .ing-name { color: var(--cream); font-weight: 500; }
  .ing-qty { color: var(--accent2); font-weight: 600; font-size: 13px; }

  .steps-list { list-style:none; margin-bottom:26px; }
  .step-item {
    display: flex;
    gap: 14px;
    margin-bottom: 16px;
    position: relative;
  }
  .step-item:not(:last-child)::after {
    content:'';
    position: absolute;
    right: 19px; top: 40px;
    width: 2px;
    height: calc(100% - 8px);
    background: var(--border);
  }
  .step-num {
    flex-shrink: 0;
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; color: #fff;
    box-shadow: 0 4px 12px rgba(200,132,58,.35);
  }
  .step-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.75;
    padding-top: 8px;
    flex: 1;
    font-weight: 400;
  }

  .note-box {
    background: rgba(200,132,58,.09);
    border: 1px solid rgba(200,132,58,.3);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--accent2);
    line-height: 1.75;
    font-weight: 400;
  }
  .note-box strong { display:block; margin-bottom:4px; color:var(--accent); font-size:14px; }

  /* ══════════ MODAL ══════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 300;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 26px 26px 0 0;
    padding: 18px 20px 50px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp .3s ease;
    direction: rtl;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--cream);
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 15px; }
  .form-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    display: block;
    margin-bottom: 7px;
    font-weight: 600;
  }
  .form-control {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    direction: rtl;
    resize: vertical;
    transition: border-color .2s;
    font-weight: 400;
  }
  .form-control:focus { border-color: var(--accent); }
  select.form-control { appearance: none; }
  .row2 { display:flex; gap:10px; }
  .row2 .form-group { flex:1; }

  .ing-row {
    display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
  }
  .ing-row .form-control { flex:1; }
  .btn-rm {
    background: rgba(192,57,43,.15);
    border: none; color: var(--red);
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer; font-size: 17px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add-row {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 11px;
    padding: 10px;
    width: 100%;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    font-weight: 600;
    transition: all .2s;
  }
  .btn-add-row:active { border-color:var(--accent); color:var(--accent); }

  .step-row { display:flex; gap:8px; margin-bottom:8px; align-items:flex-start; }
  .step-num-sm {
    flex-shrink: 0;
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 800; color:#fff;
    margin-top: 9px;
  }

  .btn-save {
    width:100%; background:var(--accent); color:#fff;
    border:none; border-radius:14px; padding:15px;
    font-size:16px; font-family:'Cairo',sans-serif; font-weight:700;
    cursor:pointer; margin-top:20px;
    box-shadow: 0 8px 24px rgba(200,132,58,.4);
    transition: opacity .15s;
  }
  .btn-save:active { opacity:.85; }
  .btn-del {
    width:100%; background:transparent;
    color:var(--red); border:1px solid rgba(192,57,43,.3);
    border-radius:14px; padding:13px;
    font-size:14px; font-family:'Cairo',sans-serif; font-weight:600;
    cursor:pointer; margin-top:10px;
  }
  .btn-cancel {
    width:100%; background:transparent;
    color:var(--muted); border:none;
    padding:12px; font-size:14px;
    font-family:'Cairo',sans-serif; cursor:pointer;
    margin-top:5px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 88px; left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--cream);
    border-radius: 14px;
    padding: 12px 22px;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    opacity: 0;
    transition: all .3s;
    z-index: 400;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* EMPTY */
  .empty-state {
    grid-column:1/-1;
    text-align:center; padding:60px 20px;
    color: var(--muted);
  }
  .empty-state .ei { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; line-height:1.7; font-weight:500; }

  ::-webkit-scrollbar { width:0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="logo">كتاب <span>البريستا</span></div>
      <div class="sub">مجموعة الوصفات الاحترافية</div>
    </div>
    <button class="btn-add" onclick="openAdd()" title="إضافة وصفة">+</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="ابحث عن وصفة..." oninput="renderCards()">
  </div>
  <div class="cats" id="catTabs"></div>
</div>

<div class="content">
  <div class="section-label" id="secLabel">
    جميع الوصفات <span class="count-pill" id="countPill">0</span>
  </div>
  <div class="recipe-grid" id="recipeGrid"></div>
</div>

<div class="detail-view" id="detailView">
  <div class="detail-hero" id="dHero">
    <div class="detail-hero-bg" id="dHeroBg"></div>
    <img src="" class="detail-hero-img" id="dHeroImg" style="display:none;" alt="">
    <div class="detail-hero-emoji" id="dHeroEmoji"></div>
    <div class="detail-hero-overlay"></div>
    <button class="detail-back" onclick="closeDetail()">→</button>
    <button class="detail-edit-btn" onclick="editCurrent()">✏️</button>
  </div>
  <div class="detail-body">
    <div class="detail-cat"><span class="cat-pill" id="dCatPill"></span></div>
    <div class="detail-title" id="dTitle"></div>
    <div class="detail-desc" id="dDesc"></div>
    <div class="stats-row" id="dStats"></div>
    <div class="sec-title">المكوّنات</div>
    <ul class="ing-list" id="dIngList"></ul>
    <div class="sec-title">طريقة التحضير</div>
    <ul class="steps-list" id="dStepsList"></ul>
    <div class="note-box" id="dNote" style="display:none">
      <strong>👨‍🍳 ملاحظة الشيف</strong>
      <span id="dNoteText"></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">إضافة وصفة جديدة</div>

    <div class="form-group">
      <label class="form-label">اسم الوصفة</label>
      <input class="form-control" id="fName" placeholder="مثال: قهوة لاتيه بالكراميل">
    </div>

    <div class="form-group">
      <label class="form-label">التصنيف</label>
      <select class="form-control" id="fCat">
        <option value="hot">☕ مشروبات ساخنة</option>
        <option value="cold">🧊 مشروبات باردة</option>
        <option value="smoothie">🫐 سموذي</option>
        <option value="milkshake">🥤 ميلك شيك</option>
        <option value="juice">🍊 عصير طازج</option>
        <option value="dessert">🧇 حلويات (وافل)</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">وصف الوصفة</label>
      <textarea class="form-control" id="fDesc" rows="2" placeholder="وصف مختصر..."></textarea>
    </div>

    <div class="row2">
      <div class="form-group">
        <label class="form-label">وقت التحضير (دقيقة)</label>
        <input class="form-control" id="fPrep" type="number" placeholder="5">
      </div>
      <div class="form-group">
        <label class="form-label">السعرات</label>
        <input class="form-control" id="fCal" type="number" placeholder="200">
      </div>
      <div class="form-group">
        <label class="form-label">الكميات</label>
        <input class="form-control" id="fServ" type="number" placeholder="1">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">المكوّنات</label>
      <div id="ingList"></div>
      <button class="btn-add-row" onclick="addIngRow()">+ أضف مكوّن</button>
    </div>

    <div class="form-group">
      <label class="form-label">خطوات التحضير</label>
      <div id="stepList"></div>
      <button class="btn-add-row" onclick="addStepRow()">+ أضف خطوة</button>
    </div>

    <div class="form-group">
      <label class="form-label">ملاحظة الشيف (اختياري)</label>
      <textarea class="form-control" id="fNote" rows="2" placeholder="نصائح ومقترحات..."></textarea>

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let storedState = JSON.parse(localStorage.getItem('baristaAR') || 'null');
if(storedState && storedState.length < 21) {
  // If we have old state without the new milkshakes, force reset
  storedState = null;
  localStorage.removeItem('baristaAR');
}
let recipes = storedState || DEFAULT;
let activeCat = 'all';
let currentId = null;
let editingId = null;
function persist(){ localStorage.setItem('baristaAR', JSON.stringify(recipes)); }

// ═══════════════════════════════════════════════════════
// RENDER TABS
// ═══════════════════════════════════════════════════════
function renderTabs(){
  document.getElementById('catTabs').innerHTML = CATS.map(c => `
    <button class="cat-btn ${activeCat===c.id?'active':''}" onclick="setCategory('${c.id}')">
      ${c.emoji} ${c.label}
    </button>`).join('');
}
function setCategory(id){ activeCat=id; renderTabs(); renderCards(); }

// ═══════════════════════════════════════════════════════
// BUILD GRADIENT CARD VISUAL
// ═══════════════════════════════════════════════════════
function buildVisual(cat, emoji, wide){
  const c = CAT_MAP[cat];
  return `
    <div class="card-visual">
      <div class="card-bg" style="background:linear-gradient(135deg,${c.grad[0]} 0%,${c.grad[1]} 100%)">
        <div class="card-orb" style="background:${c.orb}"></div>
        <span class="card-emoji">${emoji}</span>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// RENDER CARDS
// ═══════════════════════════════════════════════════════
const CAT_EMOJI = {
  hot:'☕', cold:'🧊', smoothie:'🫐',
  milkshake:'🥤', juice:'🍊', dessert:'🧇'
};

function renderCards(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = activeCat==='all' ? recipes : recipes.filter(r=>r.cat===activeCat);
  if(q) list = list.filter(r=> r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q));

  const cat = CAT_MAP[activeCat];
  document.getElementById('secLabel').innerHTML =
    `${cat.emoji} ${cat.label} <span class="count-pill">${list.length}</span>`;

  const grid = document.getElementById('recipeGrid');
  if(!list.length){
    grid.innerHTML = `<div class="empty-state">
      <div class="ei">☕</div>
      <p>لا توجد وصفات بعد.<br>اضغط <strong>+</strong> لإضافة وصفة!</p>
    </div>`; return;
  }

  grid.innerHTML = list.map((r, i)=>{
    const c = CAT_MAP[r.cat];
    const em = CAT_EMOJI[r.cat];
    const isWide = r.wide && i===0;
    const prepStr = r.prep<60 ? r.prep+'د' : Math.round(r.prep/60)+'س';
    return `
    <div class="recipe-card ${isWide?'wide':''}" onclick="openDetail(${r.id})">
      <div class="card-visual">
        <div class="card-bg" style="background:linear-gradient(135deg,${c.grad[0]} 0%,${c.grad[1]} 100%)">
          <div class="card-orb" style="background:${c.orb}"></div>
          ${r.image ? `<img src="${r.image}" class="card-img" alt="${r.name}" loading="lazy">` : `<span class="card-emoji" style="${isWide?'font-size:58px':''}">${em}</span>`}
        </div>
      </div>
      <div class="card-info">
        <span class="cat-pill pill-${r.cat}">${em} ${c.label}</span>
        <div class="card-name">${r.name}</div>
        <div class="card-meta">
          <span>⏱ ${prepStr}</span>
          <span>🔥 ${r.cal} سعرة</span>
          <span>🍽 ${r.servings} حصة</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════════════════════
function openDetail(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  currentId = id;
  const c = CAT_MAP[r.cat];
  const em = CAT_EMOJI[r.cat];

  // hero bg
  document.getElementById('dHeroBg').style.background =
    `linear-gradient(135deg,${c.grad[0]} 0%,${c.grad[1]} 100%)`;
  document.getElementById('dHeroEmoji').textContent = em;
  
  const heroImg = document.getElementById('dHeroImg');
  if(r.image) {
    heroImg.src = r.image;
    heroImg.style.display = 'block';
    document.getElementById('dHeroEmoji').style.display = 'none';
  } else {
    heroImg.style.display = 'none';
    document.getElementById('dHeroEmoji').style.display = 'block';
  }

  // pill
  const pill = document.getElementById('dCatPill');
  pill.textContent = em+' '+c.label;
  pill.className = `cat-pill pill-${r.cat}`;

  document.getElementById('dTitle').textContent = r.name;
  document.getElementById('dDesc').textContent = r.desc;

  const prepStr = r.prep<60 ? r.prep+' دقيقة' : Math.round(r.prep/60)+' ساعة';
  document.getElementById('dStats').innerHTML = `
    <div class="stat-box"><span class="stat-val">${prepStr}</span><span class="stat-lbl">وقت التحضير</span></div>
    <div class="stat-box"><span class="stat-val">${r.cal}</span><span class="stat-lbl">سعرة حرارية</span></div>
    <div class="stat-box"><span class="stat-val">${r.servings}</span><span class="stat-lbl">حصة</span></div>`;

  document.getElementById('dIngList').innerHTML =
    r.ingredients.map(i=>`<li class="ing-item"><span class="ing-name">${i.name}</span><span class="ing-qty">${i.qty}</span></li>`).join('');

  document.getElementById('dStepsList').innerHTML =
    r.steps.map((s,i)=>`<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('');

  const noteEl = document.getElementById('dNote');
  if(r.note){ document.getElementById('dNoteText').textContent=r.note; noteEl.style.display='block'; }
  else noteEl.style.display='none';

  const dv = document.getElementById('detailView');
  dv.classList.add('open');
  dv.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeDetail(){
  document.getElementById('detailView').classList.remove('open');
  document.body.style.overflow = '';
  currentId = null;
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openAdd(){
  editingId=null;
  document.getElementById('modalTitle').textContent='إضافة وصفة جديدة';
  document.getElementById('btnDel').style.display='none';
  clearForm();
  addIngRow(); addIngRow();
  addStepRow();
  document.getElementById('modalOverlay').classList.add('open');
}

function editCurrent(){
  const r = recipes.find(x=>x.id===currentId);
  if(!r) return;
  editingId=r.id;
  document.getElementById('modalTitle').textContent='تعديل الوصفة';
  document.getElementById('btnDel').style.display='block';
  clearForm();
  document.getElementById('fName').value=r.name;
  document.getElementById('fCat').value=r.cat;
  document.getElementById('fDesc').value=r.desc;
  document.getElementById('fPrep').value=r.prep;
  document.getElementById('fCal').value=r.cal;
  document.getElementById('fServ').value=r.servings;
  document.getElementById('fNote').value=r.note||'';
  r.ingredients.forEach(i=>addIngRow(i.name,i.qty));
  r.steps.forEach(s=>addStepRow(s));
  document.getElementById('modalOverlay').classList.add('open');
}

function clearForm(){
  ['fName','fDesc','fPrep','fCal','fServ','fNote'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('fCat').value='hot';
  document.getElementById('ingList').innerHTML='';
  document.getElementById('stepList').innerHTML='';
}

function addIngRow(name='',qty=''){
  const row=document.createElement('div');
  row.className='ing-row';
  row.innerHTML=`
    <input class="form-control" placeholder="اسم المكوّن" value="${name}">
    <input class="form-control" placeholder="الكمية" style="max-width:95px" value="${qty}">
    <button class="btn-rm" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('ingList').appendChild(row);
}

function addStepRow(text=''){
  const n = document.getElementById('stepList').children.length+1;
  const row=document.createElement('div');
  row.className='step-row';
  row.innerHTML=`
    <div class="step-num-sm">${n}</div>
    <textarea class="form-control" rows="2" placeholder="اشرح الخطوة ${n}…">${text}</textarea>
    <button class="btn-rm" onclick="this.parentElement.remove()" style="margin-top:9px">×</button>`;
  document.getElementById('stepList').appendChild(row);
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ toast('⚠️ أدخل اسم الوصفة'); return; }

  const ingRows=[...document.getElementById('ingList').querySelectorAll('.ing-row')];
  const ingredients=[];
  ingRows.forEach(row=>{
    const ins=row.querySelectorAll('input');
    if(ins[0].value.trim()) ingredients.push({name:ins[0].value.trim(), qty:ins[1].value.trim()||'—'});
  });
  if(!ingredients.length){ toast('⚠️ أضف مكوّناً واحداً على الأقل'); return; }

  const steps=[...document.getElementById('stepList').querySelectorAll('textarea')]
    .map(t=>t.value.trim()).filter(Boolean);
  if(!steps.length){ toast('⚠️ أضف خطوة واحدة على الأقل'); return; }

  const recipe={
    id: editingId||Date.now(),
    cat: document.getElementById('fCat').value,
    name,
    desc: document.getElementById('fDesc').value.trim()||'وصفة لذيذة من البريستا.',
    prep: parseInt(document.getElementById('fPrep').value)||5,
    cal: parseInt(document.getElementById('fCal').value)||0,
    servings: parseInt(document.getElementById('fServ').value)||1,
    ingredients, steps,
    note: document.getElementById('fNote').value.trim(),
  };

  if(editingId){
    const idx=recipes.findIndex(r=>r.id===editingId);
    recipes[idx]=recipe;
    currentId=recipe.id;
    toast('✅ تم تحديث الوصفة!');
  } else {
    recipes.push(recipe);
    toast('✅ تمت إضافة الوصفة!');
  }
  persist(); closeModal(); renderCards();
  if(editingId) setTimeout(()=>openDetail(recipe.id),150);
}

function deleteRecipe(){
  if(!editingId) return;
  if(!confirm('حذف هذه الوصفة نهائياً؟')) return;
  recipes=recipes.filter(r=>r.id!==editingId);
  persist(); closeModal(); closeDetail(); renderCards();
  toast('🗑 تم حذف الوصفة');
}

// OVERLAY CLICK
document.getElementById('modalOverlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// TOAST
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// INIT
renderTabs();
renderCards();
</script>
